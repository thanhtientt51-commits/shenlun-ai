var photos=[];
function renderPhotos(){
  var g=document.getElementById("photoGrid"),h="";
  for(var i=0;i<8;i++){
    if(i<photos.length){
      h+='<div class="photo-slot"><img src="'+photos[i]+'"><button class="photo-del" onclick="removePhoto('+i+')">✕</button></div>';
    }else if(i===photos.length){
      h+='<div class="photo-slot" onclick="document.getElementById(\'photoInputEl\').click()"><span class=plus>+</span></div>';
    }else{
      h+='<div class="photo-slot"><span class=plus style="color:#e8e8e8">+</span></div>';
    }
  }
  g.innerHTML=h;
  document.getElementById("clearPhotoBtn").style.display=photos.length?"inline-flex":"none";
  document.getElementById("btnGradePhoto").disabled=!photos.length;
  var inp=document.getElementById("photoInputEl");
  if(!inp){
    inp=document.createElement("input");inp.type="file";inp.id="photoInputEl";
    inp.accept="image/*";inp.multiple=true;inp.style.display="none";inp.onchange=addPhotos;
    document.body.appendChild(inp);
  }
  g.ondragover=function(e){e.preventDefault()};
  g.ondrop=function(e){e.preventDefault();handleDrop(e.dataTransfer.files)};
}
function handleDrop(files){
  var rem=8-photos.length;if(rem<=0)return;
  var n=Math.min(files.length,rem),loaded=0;
  for(var i=0;i<n;i++){readFile(files[i],function(){loaded++;if(loaded===n)renderPhotos()})}
}
function addPhotos(){
  var f=document.getElementById("photoInputEl").files;
  if(!f.length)return;handleDrop(f);document.getElementById("photoInputEl").value="";
}
function readFile(file,cb){
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var c=document.createElement("canvas"),mw=800,mh=800,ra=Math.min(mw/img.width,mh/img.height,1);
      c.width=img.width*ra;c.height=img.height*ra;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      photos.push(c.toDataURL("image/jpeg",0.7));if(cb)cb();
    };img.onerror=function(){if(cb)cb()}; img.src=e.target.result;
  };r.readAsDataURL(file);
}
function removePhoto(i){photos.splice(i,1);renderPhotos()}
function clearPhotos(){photos=[];renderPhotos()}
async function gradePhotos(){
  if(!photos.length)return;

  var content=[{type:"text",text:info}];
  for(var i=0;i<photos.length;i++){content.push({type:"image_url",image_url:{url:photos[i]}})}
  document.getElementById("gradeEmpty").style.display="none";
  document.getElementById("gradeResult").classList.add("show");
  document.getElementById("scoreNum").textContent="...";
  document.getElementById("gradeContent").innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  try{
    var res=await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+QWEN_API_KEY},body:JSON.stringify({model:"qwen-vl-plus",messages:[{role:"user",content:content}],max_tokens:1500,temperature:.7})});
    if(!res.ok){var errText=await res.text();throw new Error("HTTP "+res.status+": "+errText.substring(0,300))}
    var d=await res.json();
    if(d.error){throw new Error(d.error.message||JSON.stringify(d.error))}
    var r=d.choices[0].message.content;
    var sm=r.match(/总分[：:]\s*(\d{1,3})\s*分/),sc=sm?parseInt(sm[1]):0;
    var dims=["观点立意","逻辑结构","论证深度","语言表达"];
    for(var i=0;i<4;i++){var re=new RegExp(dims[i]+"[^0-9]*?(\\d{1,2})");var m=r.match(re);document.getElementById("dim"+(i+1)).textContent=m?m[1]+"/25":"-"}
    document.getElementById("scoreNum").textContent=sc;

  }catch(e){document.getElementById("gradeContent").innerHTML="<div style=color:var(--red)>错误："+e.message+"</div>"}
  b.disabled=false;b.innerHTML="AI 批改";
}
